<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Голосование</title>

<style>
body {
    background-color: #e6a5ad;
    font-family: Arial;
    text-align: center;
}

.block {
    background-color: gray;
    padding: 20px;
    border-radius: 15px;
    width: 60%;
    margin: auto;
    margin-top: 20px;
}

h2 {
    color: aquamarine;
}

a, button {
    color: aquamarine;
    background-color: transparent;
    border: 1px solid aquamarine;
    padding: 8px 15px;
    cursor: pointer;
}

button:hover {
    background-color: aquamarine;
    color: black;
}

table {
    margin: auto;
    margin-top: 15px;
    border-collapse: collapse;
}

td {
    border: 1px solid black;
    padding: 8px;
}
</style>

</head>

<body>

<div style="margin:20px;">
    <a href="index.html">← Вернуться на главную</a>
</div>

<div class="block">
<h2>Голосование</h2>

<input type="text" id="addFriend" placeholder="Введите имя">
<button id="addNew">Добавить</button>

<table id="output"></table>
</div>

<script>
let myArray = ["Артемий", "Иван", "Мария"];
let output = document.getElementById("output");

function build() {
    output.innerHTML = "";

    myArray.forEach((name, i) => {
        let tr = document.createElement("tr");

        let td1 = document.createElement("td");
        td1.textContent = i + 1;

        let td2 = document.createElement("td");
        td2.textContent = name;

        let td3 = document.createElement("td");
        td3.textContent = 0;

        tr.append(td1, td2, td3);

        tr.addEventListener("click", () => {
            td3.textContent = Number(td3.textContent) + 1;
        });

        output.appendChild(tr);
    });
}

build();

document.getElementById("addNew").onclick = () => {
    let val = document.getElementById("addFriend").value;
    if (val) {
        myArray.push(val);
        build();
        document.getElementById("addFriend").value = "";
    }
};
</script>

</body>
</html>
