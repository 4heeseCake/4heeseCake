<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>WEB.HW.04</title>

<style>
body {
    background-color: #e6a5ad;
    font-family: Arial;
}

.container {
    width: 80%;
    margin: auto;
}

.block {
    background-color: gray;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

h2 {
    color: #7fffd4;
}

.title {
    font-size: 1.3em;
    background-color: #ccc;
    padding: 10px;
    cursor: pointer;
    margin-top: 5px;
}

.myText {
    display: none;
    padding: 10px;
}

.active {
    display: block;
}

/* Таблица */
table, td {
    border: 1px solid black;
    border-collapse: collapse;
    padding: 5px;
}

/* Виселица */
.box {
    display: inline-block;
    padding: 5px;
    border: 1px solid black;
    margin: 3px;
    cursor: pointer;
}
.boxE {
    display: inline-block;
    width: 40px;
    border: 1px solid #ccc;
    margin: 3px;
}
</style>
</head>

<body>

<div class="container">

<h1>WEB.HW.04</h1>

<!-- 1. Аккордеон -->
<div class="block">
<h2>Аккордеон</h2>

<div class="title">Заголовок 1</div>
<div class="myText">Текст 1</div>

<div class="title">Заголовок 2</div>
<div class="myText">Текст 2</div>

<div class="title">Заголовок 3</div>
<div class="myText">Текст 3</div>

</div>

<!-- 2. Голосование -->
<div class="block">
<h2>Голосование</h2>

<input type="text" id="addFriend">
<button id="addNew">Добавить</button>

<table id="output"></table>
</div>

<!-- 3. Виселица -->
<div class="block">
<h2>Виселица</h2>

<div class="score"></div>
<div class="puzzle"></div>
<div class="letters"></div>
<button id="start">Start Game</button>

</div>

</div>

<script>

//// 1. АККОРДЕОН
let titles = document.querySelectorAll(".title");
let texts = document.querySelectorAll(".myText");

titles.forEach((title, index) => {
    title.addEventListener("click", () => {

        texts.forEach(t => t.classList.remove("active"));

        texts[index].classList.toggle("active");
    });
});

//// 2. ГОЛОСОВАНИЕ
let myArray = ["Артемий", "Иван", "Мария"];
let output = document.getElementById("output");

function buildTable() {
    output.innerHTML = "";

    myArray.forEach((name, index) => {
        let tr = document.createElement("tr");

        let td1 = document.createElement("td");
        td1.textContent = index + 1;

        let td2 = document.createElement("td");
        td2.textContent = name;

        let td3 = document.createElement("td");
        td3.textContent = 0;

        tr.appendChild(td1);
        tr.appendChild(td2);
        tr.appendChild(td3);

        tr.addEventListener("click", () => {
            td3.textContent = Number(td3.textContent) + 1;
        });

        output.appendChild(tr);
    });
}

buildTable();

document.getElementById("addNew").addEventListener("click", () => {
    let val = document.getElementById("addFriend").value;
    if (val) {
        myArray.push(val);
        buildTable();
    }
});

//// 3. ВИСЕЛИЦА
let words = ["javascript", "html", "css"];
let puzzle = document.querySelector(".puzzle");
let letters = document.querySelector(".letters");
let score = document.querySelector(".score");

let current = "";
let guessArr = [];
let remaining = 0;

document.getElementById("start").addEventListener("click", startGame);

function startGame() {
    letters.innerHTML = "";
    puzzle.innerHTML = "";

    current = words[Math.floor(Math.random() * words.length)];
    guessArr = current.split("");
    remaining = guessArr.length;

    buildPuzzle();
    buildLetters();
    updateScore();
}

function buildPuzzle() {
    guessArr.forEach(() => {
        let span = document.createElement("span");
        span.textContent = "_ ";
        puzzle.appendChild(span);
    });
}

function buildLetters() {
    for (let i = 97; i <= 122; i++) {
        let btn = document.createElement("span");
        btn.textContent = String.fromCharCode(i);
        btn.classList.add("box");

        btn.addEventListener("click", function () {
            this.style.background = "gray";
            this.style.pointerEvents = "none";
            checkLetter(this.textContent);
        });

        letters.appendChild(btn);
    }
}

function checkLetter(letter) {
    guessArr.forEach((l, i) => {
        if (l === letter) {
            puzzle.children[i].textContent = letter + " ";
            remaining--;
        }
    });

    updateScore();
}

function updateScore() {
    score.textContent = "Осталось букв: " + remaining;

    if (remaining <= 0) {
        score.textContent = "Ты выиграл!";
    }
}

</script>

</body>
</html>
