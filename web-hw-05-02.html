<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB.HW.05.02 — Игра на реакцию</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>WEB.HW.05.02 — Игра на реакцию</h1>
            <p>Проверка скорости клика после появления цели</p>
        </header>

        <section>
            <a class="page-link" href="index.html">← Вернуться на главную</a>

            <h2>Игра на реакцию</h2>
            <p>
                Нажмите «Пуск», дождитесь появления красного квадрата
                и нажмите на него как можно быстрее.
            </p>

            <button class="btn" id="startButton">Пуск</button>

            <div class="reaction-field" id="reactionField">
                <button class="reaction-target" id="targetButton"></button>
            </div>

            <div class="result-box" id="messageBlock">
                Нажмите «Пуск», чтобы начать.
            </div>
        </section>
    </div>

    <script>
        const startButton = document.getElementById('startButton');
        const reactionField = document.getElementById('reactionField');
        const targetButton = document.getElementById('targetButton');
        const messageBlock = document.getElementById('messageBlock');

        let startTime = 0;
        let timerId = null;
        let targetIsVisible = false;

        function randomNumber(max) {
            return Math.floor(Math.random() * max);
        }

        function startGame() {
            clearTimeout(timerId);

            targetButton.style.display = 'none';
            targetIsVisible = false;

            startButton.disabled = true;
            messageBlock.textContent = 'Ждите появления красного квадрата...';

            const delay = 1000 + randomNumber(3000);

            timerId = setTimeout(function () {
                showTarget();
            }, delay);
        }

        function showTarget() {
            const targetSize = 55;

            const maxX = reactionField.clientWidth - targetSize;
            const maxY = reactionField.clientHeight - targetSize;

            const x = randomNumber(maxX);
            const y = randomNumber(maxY);

            targetButton.style.left = x + 'px';
            targetButton.style.top = y + 'px';
            targetButton.style.display = 'block';

            startTime = Date.now();
            targetIsVisible = true;

            messageBlock.textContent = 'ЖМИ!';
        }

        function finishGame(event) {
            event.stopPropagation();

            if (!targetIsVisible) {
                return;
            }

            const endTime = Date.now();
            const result = ((endTime - startTime) / 1000).toFixed(3);

            targetButton.style.display = 'none';
            targetIsVisible = false;
            startButton.disabled = false;

            messageBlock.textContent = 'Ваше время реакции: ' + result + ' сек. Для новой попытки нажмите «Пуск».';
        }

        startButton.addEventListener('click', startGame);
        targetButton.addEventListener('click', finishGame);
    </script>

</body>
</html>
