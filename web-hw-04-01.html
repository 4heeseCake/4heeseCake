<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Аккордеон</title>

<style>
.title {
    background: #ccc;
    padding: 10px;
    cursor: pointer;
}
.myText {
    display: none;
    padding: 10px;
}
.active {
    display: block;
}
</style>
</head>

<body>

<h2>Аккордеон</h2>

<div class="title">Заголовок 1</div>
<div class="myText">Текст 1</div>

<div class="title">Заголовок 2</div>
<div class="myText">Текст 2</div>

<div class="title">Заголовок 3</div>
<div class="myText">Текст 3</div>

<script>
let titles = document.querySelectorAll(".title");
let texts = document.querySelectorAll(".myText");

titles.forEach((t, i) => {
    t.addEventListener("click", () => {
        texts.forEach(el => el.classList.remove("active"));
        texts[i].classList.toggle("active");
    });
});
</script>

</body>
</html>
