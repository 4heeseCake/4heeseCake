<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Виселица</title>

<style>
.gameArea {
    text-align: center;
    font-size: 20px;
}

.letter {
    display: inline-block;
    margin: 5px;
    padding: 10px;
    border: 1px solid black;
    cursor: pointer;
}

.word span {
    font-size: 30px;
    margin: 5px;
}

.hearts {
    font-size: 25px;
    color: red;
}
</style>

</head>

<body>

<div class="gameArea">

<h2>Виселица</h2>

<div class="hearts"></div>
<div class="word"></div>
<div class="letters"></div>

<br>
<button id="start">Начать игру</button>

<div class="result"></div>

</div>

<script>

const words = [
"МАССИВ","ФУНКЦИЯ","ПЕРЕМЕННАЯ","ЦИКЛ",
"КЛАСС","ОБЪЕКТ","АЛГОРИТМ","СТРОКА",
"БРАУЗЕР","СЕРВЕР"
];

let word = "";
let guessed = [];
let lives = 5;

const wordDiv = document.querySelector(".word");
const lettersDiv = document.querySelector(".letters");
const heartsDiv = document.querySelector(".hearts");
const resultDiv = document.querySelector(".result");

document.getElementById("start").onclick = startGame;

function startGame() {
    word = words[Math.floor(Math.random()*words.length)];
    guessed = Array(word.length).fill("_");
    lives = 5;

    resultDiv.textContent = "";
    drawHearts();
    drawWord();
    drawLetters();
}

function drawHearts() {
    heartsDiv.textContent = "❤️".repeat(lives);
}

function drawWord() {
    wordDiv.innerHTML = "";
    guessed.forEach(l => {
        let span = document.createElement("span");
        span.textContent = l;
        wordDiv.appendChild(span);
    });
}

function drawLetters() {
    lettersDiv.innerHTML = "";

    const alphabet = "АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ";

    for (let l of alphabet) {
        let btn = document.createElement("div");
        btn.textContent = l;
        btn.className = "letter";

        btn.onclick = () => handleGuess(l, btn);

        lettersDiv.appendChild(btn);
    }
}

function handleGuess(letter, btn) {
    btn.style.background = "gray";
    btn.onclick = null;

    let found = false;

    for (let i = 0; i < word.length; i++) {
        if (word[i] === letter) {
            guessed[i] = letter;
            found = true;
        }
    }

    if (!found) {
        lives--;
        drawHearts();
    }

    drawWord();
    checkGame();
}

function checkGame() {

    if (!guessed.includes("_")) {
        resultDiv.textContent = "🎉 ТЫ ВЫИГРАЛ!";
    }

    if (lives <= 0) {
        resultDiv.innerHTML = `
        ТЫ ПРОИГРАЛ! <br>
        Слово было: ${word} <br>
        <button onclick="startGame()">Попробовать еще раз</button>
        `;
    }
}

</script>

</body>
</html>
