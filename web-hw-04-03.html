<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB.HW.04.03 — Виселица</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>WEB.HW.04.03 — Виселица</h1>
            <p>Небольшая игра на JavaScript</p>
        </header>

        <section>
            <a class="page-link" href="index.html">← Вернуться на главную</a>

            <h2>Игра «Виселица»</h2>
            <p>
                Нажмите «Начать игру», а затем выбирайте буквы.
                Нужно угадать слово до того, как закончатся жизни.
            </p>

            <button class="btn" id="startButton">Начать игру</button>

            <div class="hearts" id="livesBlock"></div>
            <div class="word" id="wordBlock"></div>
            <div class="letters" id="lettersBlock"></div>

            <div class="result-box" id="resultBlock">
                Нажмите кнопку, чтобы начать игру.
            </div>
        </section>
    </div>

    <script>
        const words = [
            'МАССИВ',
            'ФУНКЦИЯ',
            'ПЕРЕМЕННАЯ',
            'ЦИКЛ',
            'КЛАСС',
            'ОБЪЕКТ',
            'АЛГОРИТМ',
            'СТРОКА',
            'БРАУЗЕР',
            'СЕРВЕР'
        ];

        const alphabet = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';

        const startButton = document.getElementById('startButton');
        const livesBlock = document.getElementById('livesBlock');
        const wordBlock = document.getElementById('wordBlock');
        const lettersBlock = document.getElementById('lettersBlock');
        const resultBlock = document.getElementById('resultBlock');

        let currentWord = '';
        let openedLetters = [];
        let lives = 5;
        let isGameActive = false;

        function startGame() {
            const randomIndex = Math.floor(Math.random() * words.length);

            currentWord = words[randomIndex];
            openedLetters = Array(currentWord.length).fill('_');
            lives = 5;
            isGameActive = true;

            resultBlock.textContent = 'Игра началась. Выберите букву.';
            drawLives();
            drawWord();
            drawLetters();
        }

        function drawLives() {
            livesBlock.textContent = '❤️'.repeat(lives);
        }

        function drawWord() {
            wordBlock.replaceChildren();

            openedLetters.forEach(function (letter) {
                const span = document.createElement('span');
                span.classList.add('word-letter');
                span.textContent = letter;
                wordBlock.appendChild(span);
            });
        }

        function drawLetters() {
            lettersBlock.replaceChildren();

            for (const letter of alphabet) {
                const button = document.createElement('button');

                button.classList.add('letter-button');
                button.textContent = letter;

                button.addEventListener('click', function () {
                    checkLetter(letter, button);
                });

                lettersBlock.appendChild(button);
            }
        }

        function checkLetter(letter, button) {
            if (!isGameActive) {
                return;
            }

            button.disabled = true;

            let isFound = false;

            for (let i = 0; i < currentWord.length; i++) {
                if (currentWord[i] === letter) {
                    openedLetters[i] = letter;
                    isFound = true;
                }
            }

            if (!isFound) {
                lives--;
            }

            drawLives();
            drawWord();
            checkResult();
        }

        function disableLetters() {
            const letterButtons = document.querySelectorAll('.letter-button');

            letterButtons.forEach(function (button) {
                button.disabled = true;
            });
        }

        function checkResult() {
            if (!openedLetters.includes('_')) {
                resultBlock.textContent = 'Вы выиграли! Слово: ' + currentWord;
                isGameActive = false;
                disableLetters();
                return;
            }

            if (lives <= 0) {
                resultBlock.textContent = 'Вы проиграли. Было загадано слово: ' + currentWord;
                isGameActive = false;
                disableLetters();
            }
        }

        startButton.addEventListener('click', startGame);
    </script>

</body>
</html>
